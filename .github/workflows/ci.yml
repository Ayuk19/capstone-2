name: Build and Push to ECR

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - run: aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 209561932650.dkr.ecr.us-east-1.amazonaws.com

      - run: docker build -t my-node-app .

      - run: |
          docker tag my-node-app:latest 209561932650.dkr.ecr.us-east-1.amazonaws.com/actions/ayuk-repo:dev
          docker tag my-node-app:latest 209561932650.dkr.ecr.us-east-1.amazonaws.com/actions/ayuk-repo:staging
          docker tag my-node-app:latest 209561932650.dkr.ecr.us-east-1.amazonaws.com/actions/ayuk-repo:prod

      - run: |
          docker push 209561932650.dkr.ecr.us-east-1.amazonaws.com/actions/ayuk-repo:dev
          docker push 209561932650.dkr.ecr.us-east-1.amazonaws.com/actions/ayuk-repo:staging
          docker push 209561932650.dkr.ecr.us-east-1.amazonaws.com/actions/ayuk-repo:prod
