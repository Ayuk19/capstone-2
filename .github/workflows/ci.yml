name: Build and Push to ECR

on:
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 209561932650.dkr.ecr.us-east-1.amazonaws.com

      - name: Build and push environment-specific images
        run: |
          for env in dev staging prod; do
            echo "Building image for $env environment..."
            docker build --build-arg ENV=$env -t 209561932650.dkr.ecr.us-east-1.amazonaws.com/actions/ayuk-repo:$env .
            docker push 209561932650.dkr.ecr.us-east-1.amazonaws.com/actions/ayuk-repo:$env
          done
